<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phishing Website Detection</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            height: 100vh;
            font-family: 'Inter', "Segoe UI", Tahoma, sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: #ffffff;
            width: 100%;
            max-width: 450px;
            padding: 40px 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            color: #1e293b;
            margin-bottom: 10px;
            font-size: 24px;
            font-weight: 600;
        }

        p {
            font-size: 15px;
            color: #64748b;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        input {
            width: 100%;
            padding: 15px;
            font-size: 15px;
            border-radius: 12px;
            border: 1.5px solid #e2e8f0;
            outline: none;
            transition: all 0.3s ease;
            background-color: #f8fafc;
            color: #334155;
        }

        input:focus {
            border-color: #38bdf8;
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.1);
        }

        input::placeholder {
            color: #94a3b8;
        }

        button {
            margin-top: 20px;
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            background: linear-gradient(135deg, #0284c7, #0ea5e9);
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 14px rgba(14, 165, 233, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(14, 165, 233, 0.4);
            background: linear-gradient(135deg, #0369a1, #0284c7);
        }

        .result {
            margin-top: 25px;
            font-size: 18px;
            font-weight: 600;
            padding: 15px;
            border-radius: 12px;
            animation: scaleIn 0.3s ease-out;
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .safe {
            background: #ecfdf5;
            color: #059669;
            border: 1px solid #a7f3d0;
        }

        .phishing {
            background: #fef2f2;
            color: #dc2626;
            border: 1px solid #fecaca;
        }

        /* Responsive Design */
        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
            }
            h1 {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Phishing Detection</h1>
    <p>Enter a website URL to securely analyze its legitimacy and check for malicious markers.</p>

    <form action="/predict" method="post">
        <input type="url" name="url" placeholder="https://example.com" required autocomplete="off">
        <button type="submit">Analyze URL</button>
    </form>

    {% if prediction_text %}
        <div class="result {% if 'Legitimate' in prediction_text %}safe{% else %}phishing{% endif %}">
            {{ prediction_text }}
        </div>
    {% endif %}
</div>

</body>
</html>
